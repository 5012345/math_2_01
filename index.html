<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연립일차정식 코드 브레이커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0a0a12;
            color: #00ff9d;
            overflow-x: hidden;
        }

        .cyber-panel {
            background: rgba(16, 16, 28, 0.9);
            border: 2px solid #00ff9d;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            border-radius: 15px;
        }

        .orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
            border-color: #00ff9d;
        }

        .btn-action {
            transition: all 0.3s ease;
            background: #00ff9d;
            color: #0a0a12;
            font-weight: bold;
        }

        .btn-action:hover {
            background: #05d684;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.4);
        }

        #timer-bar {
            transition: width 1s linear;
        }
        
        .equation-box {
            font-size: 2rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-2xl">
        <!-- Start Screen -->
        <div id="start-screen" class="cyber-panel p-8 text-center">
            <h1 class="text-4xl font-bold mb-6 orbitron text-white">EQUATION<br><span class="text-green-400">CODE BREAKER</span></h1>
            <p class="mb-8 text-gray-400 leading-relaxed">
                보안 시스템의 암호는 '연립일차방정식'의 해입니다.<br>
                연속해서 성공할수록 더 높은 등급의 해커가 됩니다.<br>
                준비되었나요?
            </p>
            <button id="start-btn" class="btn-action px-10 py-4 rounded-full text-xl uppercase orbitron">시스템 접속</button>
        </div>

        <!-- Main Game Screen -->
        <div id="game-screen" class="hidden cyber-panel p-6 relative">
            <!-- Header Info -->
            <div class="flex justify-between items-center mb-6 border-b border-green-900 pb-4">
                <div class="text-left">
                    <p class="text-xs uppercase text-gray-500 orbitron">Rank</p>
                    <p id="rank-display" class="font-bold text-lg text-white">초보 해커</p>
                </div>
                <div class="text-center">
                    <p class="text-xs uppercase text-gray-400 orbitron">Score</p>
                    <p id="score-display" class="text-2xl font-bold orbitron">0000</p>
                </div>
                <div class="text-right">
                    <p class="text-xs uppercase text-gray-500 orbitron">Level</p>
                    <p id="level-display" class="font-bold text-lg text-white">1</p>
                </div>
            </div>

            <!-- Timer -->
            <div class="w-full bg-gray-800 h-2 rounded-full mb-8 overflow-hidden">
                <div id="timer-bar" class="bg-green-400 h-full w-full"></div>
            </div>

            <!-- Equation Area -->
            <div class="text-center mb-10 py-6 bg-black/40 rounded-lg border border-white/10">
                <p class="text-gray-500 mb-2 text-sm uppercase orbitron">Decipher Target</p>
                <div id="equation-1" class="equation-box mb-4">ax + by = c</div>
                <div id="equation-2" class="equation-box">dx + ey = f</div>
            </div>

            <!-- Input Area -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="relative">
                    <label class="absolute -top-3 left-3 bg-[#10101c] px-2 text-xs text-green-400 orbitron">X Value</label>
                    <input type="number" id="input-x" class="w-full bg-transparent border-2 border-gray-700 rounded-lg p-4 text-2xl text-center text-white input-glow" placeholder="?">
                </div>
                <div class="relative">
                    <label class="absolute -top-3 left-3 bg-[#10101c] px-2 text-xs text-green-400 orbitron">Y Value</label>
                    <input type="number" id="input-y" class="w-full bg-transparent border-2 border-gray-700 rounded-lg p-4 text-2xl text-center text-white input-glow" placeholder="?">
                </div>
            </div>

            <button id="submit-btn" class="btn-action w-full py-4 rounded-lg text-xl uppercase orbitron mb-4">코드 입력 (해독)</button>
            <div id="msg-box" class="text-center h-6 text-sm font-bold transition-opacity duration-300 opacity-0">성공! 시스템 접근 권한 획득</div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden cyber-panel p-8 text-center">
            <h2 class="text-3xl font-bold mb-4 orbitron text-red-500">SYSTEM DISCONNECTED</h2>
            <div class="mb-8">
                <p class="text-gray-400 mb-1">최종 점수</p>
                <p id="final-score" class="text-5xl font-bold text-white orbitron">0</p>
            </div>
            <div class="mb-8 p-4 bg-white/5 rounded-lg">
                <p id="evaluation-text" class="text-green-400 font-bold italic">"당신은 전설적인 해커입니다!"</p>
            </div>
            <button id="restart-btn" class="btn-action px-8 py-3 rounded-full uppercase orbitron">재접속 시도</button>
        </div>
    </div>

    <script>
        // Game Constants & State
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let timerInterval;
        let currentAnswers = { x: 0, y: 0 };
        const maxTime = 60;

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const timerBar = document.getElementById('timer-bar');
        const msgBox = document.getElementById('msg-box');

        // Sounds & Feedback placeholders
        function showMessage(text, isError = false) {
            msgBox.innerText = text;
            msgBox.style.color = isError ? '#ff4d4d' : '#00ff9d';
            msgBox.classList.remove('opacity-0');
            setTimeout(() => msgBox.classList.add('opacity-0'), 2000);
        }

        // Logic to generate equations with integer solutions
        function generateProblem() {
            // Target answers (keep them simple for school level)
            const range = 5 + Math.floor(level / 2);
            const x = Math.floor(Math.random() * (range * 2 + 1)) - range;
            const y = Math.floor(Math.random() * (range * 2 + 1)) - range;
            
            // Coefficients
            let a, b, d, e;
            
            // Ensure equations are not linearly dependent
            do {
                a = Math.floor(Math.random() * 5) + 1;
                if(Math.random() > 0.5) a *= -1;
                b = Math.floor(Math.random() * 5) + 1;
                if(Math.random() > 0.5) b *= -1;
                d = Math.floor(Math.random() * 5) + 1;
                if(Math.random() > 0.5) d *= -1;
                e = Math.floor(Math.random() * 5) + 1;
                if(Math.random() > 0.5) e *= -1;
            } while (a * e === b * d);

            const c = a * x + b * y;
            const f = d * x + e * y;

            currentAnswers = { x, y };

            // Format strings nicely
            const formatEq = (c1, c2, res) => {
                let s1 = c1 === 1 ? 'x' : (c1 === -1 ? '-x' : `${c1}x`);
                let s2 = c2 > 0 ? ` + ${c2 === 1 ? '' : c2}y` : ` - ${Math.abs(c2) === 1 ? '' : Math.abs(c2)}y`;
                return `${s1}${s2} = ${res}`;
            };

            document.getElementById('equation-1').innerText = formatEq(a, b, c);
            document.getElementById('equation-2').innerText = formatEq(d, e, f);
        }

        function updateUI() {
            document.getElementById('score-display').innerText = score.toString().padStart(4, '0');
            document.getElementById('level-display').innerText = level;
            
            let rank = "초보 해커";
            if (score > 500) rank = "중급 해커";
            if (score > 1500) rank = "보안 전문가";
            if (score > 3000) rank = "전설의 고스트";
            document.getElementById('rank-display').innerText = rank;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 1;
                const percentage = (timeLeft / maxTime) * 100;
                timerBar.style.width = `${percentage}%`;
                
                if (timeLeft <= 10) {
                    timerBar.classList.replace('bg-green-400', 'bg-red-500');
                } else {
                    timerBar.classList.replace('bg-red-500', 'bg-green-400');
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function startGame() {
            score = 0;
            level = 1;
            timeLeft = maxTime;
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            generateProblem();
            updateUI();
            startTimer();
        }

        function checkAnswer() {
            const inputX = parseInt(document.getElementById('input-x').value);
            const inputY = parseInt(document.getElementById('input-y').value);

            if (inputX === currentAnswers.x && inputY === currentAnswers.y) {
                // Correct
                score += 100 + (timeLeft * 2);
                level += 1;
                timeLeft = Math.min(maxTime, timeLeft + 15); // Add bonus time
                showMessage("해독 성공! 보안 레벨 상승");
                document.getElementById('input-x').value = '';
                document.getElementById('input-y').value = '';
                generateProblem();
                updateUI();
            } else {
                // Wrong
                timeLeft -= 10;
                showMessage("해독 실패! 시스템 추적 중...", true);
                if(timeLeft <= 0) endGame();
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let evalMsg = "";
            if(score < 500) evalMsg = "수학책을 다시 펴야겠어요!";
            else if(score < 1500) evalMsg = "훌륭한 계산 실력이군요!";
            else evalMsg = "와우! 당신은 연립방정식의 신인가요?";
            document.getElementById('evaluation-text').innerText = `"${evalMsg}"`;
        }

        // Event Listeners
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        document.getElementById('submit-btn').addEventListener('click', checkAnswer);
        
        // Enter key support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !gameScreen.classList.contains('hidden')) {
                checkAnswer();
            }
        });

    </script>
</body>
</html>
